{% extends 'incidents/base.html' %}
{% block sidebar %}
<div class="sidebar">
    <div class="card-panel">
        <h3><i class="fas fa-key"></i> Восстановление пароля</h3>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
            </div>
            <button type="submit" class="submit-btn">Отправить ссылку</button>
        </form>
        <div class="anonymous-note"><a href="{% url 'login' %}">Вернуться ко входу</a></div>
    </div>
</div>
{% endblock %}
{% block map %}<div id="map" style="height:100%; background:#1a1e2a;"></div>{% endblock %}
